<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Night Racer</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

<style>

/* VIDEO */
.video-bg {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit: cover;
    z-index: -2;
}

/* OVERLAY */
.overlay {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* NAVBAR PRO */
.menu {
    position: fixed;
    top: 10px; /* 🔥 AJOUT */
    left: 50%;
    transform: translateX(-50%);

    width: 95%; /* un peu moins large */
    
    display: flex;
    align-items: center;
    justify-content: center;

    padding: 10px 30px;

    border-radius: 10px; /* 🔥 effet flottant */
    border: 1px solid rgba(0,170,255,0.2);
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.6);
}

/* LOGO À GAUCHE */
.logo {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%); /* 🔥 centre vertical */
    width: 65px;
}

/* LIENS CENTRÉS */
.menu-links {
    display: flex;
    gap: 30px;
}

.menu-links a {
    color: #aaa;
    text-decoration: none;
    transition: 0.3s;
}

.menu-links a:hover {
    color: #00aaff;
    text-shadow: 0 0 10px #00aaff;
}

/* HERO BAS DROITE */
.hero {
    position: absolute;
    bottom: 60px;
    right: 60px;

    text-align: right;

    background: rgba(0,0,0,0.4);
    padding: 20px 30px;
    border-radius: 10px;
    backdrop-filter: blur(10px);

    opacity: 0;
    transform: translateY(50px);
    animation: heroAppear 1s forwards;
}

/* TITRE */
.hero h1 {
    font-size: 50px;
    color: white;
    text-shadow: 0 0 20px #00aaff;
}

/* TEXTE */
.hero p {
    color: #aaa;
    margin: 10px 0;
}

/* BOUTON */
.enter-btn {
    display: inline-block;
    border: 1px solid #00aaff;
    padding: 12px 30px;
    color: #00aaff;
    text-decoration: none;
    transition: 0.3s;
}

.enter-btn:hover {
    background: #00aaff;
    color: black;
}

/* ANIMATION */
@keyframes heroAppear {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop class="video-bg">
    <source src="video.mp4" type="video/mp4">
</video>

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- NAVBAR -->
<nav class="menu">

<img src="logo2.png" class="logo">

<div class="menu-links">
<a href="index.html">Accueil</a>
<a href="classement.html">Classement</a>
<a href="courses.html">Courses</a>
<a href="club.html">Club</a>
</div>

</nav>

<!-- TEXTE -->
<div class="hero">
    <h1>🏁 FMC 🏁</h1>
    <p>Bienvenue dans le Freeway Midnight Club</p>

    <a href="classement.html" class="enter-btn">ENTRER</a>
</div>

</body>
</html>
