<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Freeway Midnight Club</title>

<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Russo One', sans-serif;
    background: url('https://i.pinimg.com/originals/95/ef/b8/95efb8425d270933e5e890b33ab5ef70.gif') no-repeat center/cover;
    color: white;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* overlay */
.overlay {
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(6px);
    padding: 40px;
    border-radius: 15px;
}

/* titre */
h1 {
    font-size: 40px;
    color: #ffcc00;
    letter-spacing: 4px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #ffcc00; }
    to { text-shadow: 0 0 30px #ffcc00, 0 0 60px #ffcc00; }
}

/* bouton */
.btn {
    margin-top: 30px;
    padding: 15px 40px;
    font-size: 18px;
    border: none;
    background: transparent;
    color: #4da6ff;
    border: 2px solid #4da6ff;
    cursor: pointer;
    transition: 0.3s;
    animation: pulse 2s infinite;
}

.btn:hover {
    background: #4da6ff;
    color: black;
    transform: scale(1.1);
}

/* animation bouton */
@keyframes pulse {
    0% { box-shadow: 0 0 5px #4da6ff; }
    50% { box-shadow: 0 0 20px #4da6ff; }
    100% { box-shadow: 0 0 5px #4da6ff; }
}
</style>
</head>

<body>

<div class="overlay">
    <h1>🏁 FREEWAY MIDNIGHT CLUB</h1>
    <button class="btn" onclick="start()">ENTRER</button>
</div>

<!-- musique -->
<audio id="music" autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function start() {
    document.body.style.transition = "0.5s";
    document.body.style.opacity = "0";

    setTimeout(() => {
        window.location.href = "main.html";
    }, 500);
}
</script>

</body>
</html>
