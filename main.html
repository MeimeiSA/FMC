<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Night Racer</title>

<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Russo One', sans-serif;
    background: url('https://i.pinimg.com/originals/95/ef/b8/95efb8425d270933e5e890b33ab5ef70.gif') no-repeat center/cover;
    color: white;
}

/* overlay */
.overlay {
    background: rgba(0,0,0,0.7);
    min-height: 100vh;
    padding: 20px;
    text-align: center;
}

h1 {
    color: #ffcc00;
    text-shadow: 0 0 20px #ffcc00;
}

/* cartes */
.card {
    background: rgba(20,20,20,0.85);
    margin: 10px auto;
    padding: 15px;
    width: 320px;
    cursor: pointer;
    transition: 0.3s;
    border-left: 4px solid #4da6ff;
}

.card:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #4da6ff;
}

/* PANEL */
.panel {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: linear-gradient(120deg, #000, #0a0a0a);
    display: none;
    animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
    from {opacity:0;}
    to {opacity:1;}
}

/* layout */
.container {
    display: flex;
    height: 100%;
}

/* gauche */
.left {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* voiture */
.car-img {
    width: 80%;
    filter: drop-shadow(0 0 40px #4da6ff);
    animation: carSlide 0.6s ease forwards;
}

@keyframes carSlide {
    from { transform: translateX(-100px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

/* droite */
.right {
    width: 50%;
    padding: 50px;
}

/* titre */
.name {
    font-size: 40px;
    color: #4da6ff;
    margin-bottom: 20px;
}

/* texte */
.info {
    opacity: 0;
    animation: fadeText 0.5s forwards;
}

.info:nth-child(2){animation-delay:0.3s;}
.info:nth-child(3){animation-delay:0.5s;}
.info:nth-child(4){animation-delay:0.7s;}
.info:nth-child(5){animation-delay:0.9s;}

@keyframes fadeText {
    to {opacity:1;}
}

/* barres */
.bar {
    background: #222;
    height: 8px;
    margin: 5px 0 15px;
}

.fill {
    background: #4da6ff;
    height: 100%;
}

/* fermer */
.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 30px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="overlay">
<h1>🏁 Night Racer 🏁</h1>

<div class="card" onclick="openPanel('p1')">#1 Pilote inconnu</div>
<div class="card" onclick="openPanel('p2')">#2 Pilote inconnu</div>
<div class="card" onclick="openPanel('p3')">#3 Pilote inconnu</div>
<div class="card" onclick="openPanel('p4')">#4 Pilote inconnu</div>
<div class="card" onclick="openPanel('p5')">#5 Pilote inconnu</div>
<div class="card" onclick="openPanel('p6')">#6 Pilote inconnu</div>
<div class="card" onclick="openPanel('p7')">#7 Pilote inconnu</div>
<div class="card" onclick="openPanel('p8')">#8 Pilote inconnu</div>
<div class="card" onclick="openPanel('p9')">#9 Pilote inconnu</div>
<div class="card" onclick="openPanel('p10')">#10 Pilote inconnu</div>

</div>

<!-- PANEL -->
<div id="panel" class="panel">
<span class="close" onclick="closePanel()">✖</span>

<div class="container">
    
    <div class="left">
        <img id="car" class="car-img">
    </div>

    <div class="right" id="info"></div>

</div>

</div>

<script>
const pilots = {
p1:{name:"Pilote 1",nickname:"Le Roi",car:"GTR",crew:"Midnight",rep:"★★★★★",story:"Le boss.",carImg:"car1.png",stats:{speed:95,drift:80,control:90,power:95}},
p2:{name:"Pilote 2",nickname:"Shadow",car:"M4",crew:"Midnight",rep:"★★★★☆",story:"Invisible.",carImg:"car1.png",stats:{speed:85,drift:75,control:80,power:85}},
p3:{name:"Pilote 3",nickname:"Nitro",car:"Supra",crew:"Midnight",rep:"★★★★☆",story:"Toujours à fond.",carImg:"car1.png",stats:{speed:90,drift:70,control:75,power:90}},
p4:{name:"Pilote 4",nickname:"Blaze",car:"R8",crew:"Midnight",rep:"★★★★☆",story:"Explosif.",carImg:"car1.png",stats:{speed:88,drift:60,control:80,power:92}},
p5:{name:"Pilote 5",nickname:"DriftKing",car:"RX7",crew:"Midnight",rep:"★★★★☆",story:"Maître drift.",carImg:"car1.png",stats:{speed:70,drift:95,control:85,power:70}},
p6:{name:"Pilote 6",nickname:"Vortex",car:"Lambo",crew:"Midnight",rep:"★★★☆☆",story:"Rapide.",carImg:"car1.png",stats:{speed:92,drift:65,control:78,power:90}},
p7:{name:"Pilote 7",nickname:"Ghost",car:"Mustang",crew:"Midnight",rep:"★★★☆☆",story:"Invisible.",carImg:"car1.png",stats:{speed:80,drift:60,control:70,power:85}},
p8:{name:"Pilote 8",nickname:"Razor",car:"370Z",crew:"Midnight",rep:"★★★☆☆",story:"Agressif.",carImg:"car1.png",stats:{speed:78,drift:75,control:72,power:80}},
p9:{name:"Pilote 9",nickname:"Phantom",car:"RS6",crew:"Midnight",rep:"★★★☆☆",story:"Silencieux.",carImg:"car1.png",stats:{speed:85,drift:60,control:75,power:88}},
p10:{name:"Pilote 10",nickname:"Eclipse",car:"C63",crew:"Midnight",rep:"★★☆☆☆",story:"Challenger.",carImg:"car1.png",stats:{speed:75,drift:55,control:65,power:82}}
};

function openPanel(id){
const p = pilots[id];

document.getElementById("car").src = p.carImg;

document.getElementById("info").innerHTML = `
<div class="name">${p.name}</div>

<div class="info"><b>Surnom :</b> ${p.nickname}</div>
<div class="info"><b>Voiture :</b> ${p.car}</div>
<div class="info"><b>Crew :</b> ${p.crew}</div>
<div class="info"><b>Réputation :</b> ${p.rep}</div>

<div class="info"><p>${p.story}</p></div>

<div class="info">Vitesse<div class="bar"><div class="fill" style="width:${p.stats.speed}%"></div></div></div>
<div class="info">Drift<div class="bar"><div class="fill" style="width:${p.stats.drift}%"></div></div></div>
<div class="info">Contrôle<div class="bar"><div class="fill" style="width:${p.stats.control}%"></div></div></div>
<div class="info">Puissance<div class="bar"><div class="fill" style="width:${p.stats.power}%"></div></div></div>
`;

document.getElementById("panel").style.display = "block";
}

function closePanel(){
document.getElementById("panel").style.display = "none";
}
</script>

</body>
</html>
