<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Classement</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

<style>

/* VIDEO BG */
.video-bg {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit: cover;
    z-index: -2;
}

/* OVERLAY */
.overlay {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.7);
    z-index: -1;
}

/* CARDS */
.card {
    margin: 10px auto;
    padding: 15px;
    width: 300px;
    cursor: pointer;
    border-left: 4px solid #00aaff;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* PANEL */
.panel {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: radial-gradient(circle at center, #02070d, #000);
    display: none;
    z-index: 9999;
}

/* CONTAINER */
.container {
    display: flex;
    height: 100%;
}

/* LEFT */
.left {
    width: 60%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* IMAGE */
.car-img {
    width: 100%;
    max-width: 750px;
    filter: drop-shadow(0 0 50px #00aaff);
}

/* RIGHT */
.right {
    width: 40%;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 20px;
}

/* TITRES */
.name {
    font-size: 42px;
    color: white;
}

.nickname {
    color: #00aaff;
}

/* BOX */
.box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(0,170,255,0.2);
    padding: 20px;
    border-radius: 12px;
}

/* TITRE BOX */
.box-title {
    margin-bottom: 10px;
    color: #00aaff;
    font-size: 14px;
}

/* STATS */
.stat {
    margin: 10px 0;
}

.bar {
    height: 6px;
    background: #111;
    border-radius: 5px;
    overflow: hidden;
}

.fill {
    height: 100%;
    width: 0;
    transition: 1s;
}

/* COULEURS */
.speed { background: #00aaff; }
.control { background: #00ff99; }
.style { background: #ff00cc; }

/* CLOSE */
.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 30px;
    cursor: pointer;
    color: white;
}

.close:hover {
    color: #00aaff;
}

</style>
</head>

<body>

<video autoplay muted loop class="video-bg">
    <source src="classement.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<nav class="menu">
<a href="index.html">Accueil</a>
<a href="classement.html">Classement</a>
<a href="courses.html">Courses</a>
<a href="club.html">Club</a>
</nav>

<div class="content">

<h1>🏆 Classement</h1>

<div class="card" onclick="openPanel('p1')">#1 ?</div>
<div class="card" onclick="openPanel('p2')">#2 Saru</div>
<div class="card" onclick="openPanel('p3')">#3 ?</div>
<div class="card" onclick="openPanel('p4')">#4 ?</div>
<div class="card" onclick="openPanel('p5')">#5 ?</div>
<div class="card" onclick="openPanel('p6')">#6 ?</div>
<div class="card" onclick="openPanel('p7')">#7 ?</div>
<div class="card" onclick="openPanel('p8')">#8 ?</div>
<div class="card" onclick="openPanel('p9')">#9 ?</div>
<div class="card" onclick="openPanel('p10')">#10 ?</div>

</div>

<!-- PANEL -->
<div id="panel" class="panel" onclick="closePanel()">
<span class="close" onclick="closePanel()">✖</span>

<div class="container" onclick="event.stopPropagation()">
<div class="left">
<img id="car" class="car-img">
</div>
<div class="right" id="info"></div>
</div>

</div>

<script>

const pilots = {
p1:{name:"?",nickname:"?",car:"?",wins:0,p2:0,p3:0,carImg:"car1.png",speed:50,control:50,style:50},

p2:{
name:"Ulysse",
nickname:"Saru",
car:"Nissan Skyline GT-R32",
wins:0,
p2:1,
p3:0,
carImg:"Photo LN Ulysse 2.png",

speed:87,
control:48,
style:51
},

p3:{name:"?",nickname:"?",car:"?",wins:0,p2:0,p3:0,carImg:"car1.png",speed:50,control:50,style:50},
p4:{name:"?",nickname:"?",car:"?",wins:0,p2:0,p3:0,carImg:"car1.png",speed:50,control:50,style:50},
p5:{name:"?",nickname:"?",car:"?",wins:0,p2:0,p3:0,carImg:"car1.png",speed:50,control:50,style:50},
p6:{name:"?",nickname:"?",car:"?",wins:0,p2:0,p3:0,carImg:"car1.png",speed:50,control:50,style:50},
p7:{name:"?",nickname:"?",car:"?",wins:0,p2:0,p3:0,carImg:"car1.png",speed:50,control:50,style:50},
p8:{name:"?",nickname:"?",car:"?",wins:0,p2:0,p3:0,carImg:"car1.png",speed:50,control:50,style:50},
p9:{name:"?",nickname:"?",car:"?",wins:0,p2:0,p3:0,carImg:"car1.png",speed:50,control:50,style:50},
p10:{name:"?",nickname:"?",car:"?",wins:0,p2:0,p3:0,carImg:"car1.png",speed:50,control:50,style:50}
};

function openPanel(id){
let p = pilots[id];

document.getElementById("car").src = p.carImg;

document.getElementById("info").innerHTML = `
<div class="name">${p.name}</div>
<div class="nickname">"${p.nickname}"</div>

<div class="box">
<div class="box-title">VÉHICULE</div>
${p.car}
</div>

<div class="box">
<div class="box-title">PALMARÈS</div>
🥇 ${p.wins}<br>
🥈 ${p.p2}<br>
🥉 ${p.p3}
</div>

<div class="box">
<div class="box-title">PERFORMANCE</div>

<div class="stat">Vitesse (${p.speed}%)
<div class="bar"><div class="fill speed"></div></div>
</div>

<div class="stat">Contrôle (${p.control}%)
<div class="bar"><div class="fill control"></div></div>
</div>

<div class="stat">Caractère (${p.style}%)
<div class="bar"><div class="fill style"></div></div>
</div>

</div>
`;

document.getElementById("panel").style.display = "block";

setTimeout(()=>{
document.querySelector(".speed").style.width = p.speed + "%";
document.querySelector(".control").style.width = p.control + "%";
document.querySelector(".style").style.width = p.style + "%";
},300);
}

function closePanel(){
document.getElementById("panel").style.display = "none";
}

</script>

</body>
</html>
