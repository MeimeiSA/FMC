<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Classement</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

<style>

/* VIDEO BG */
.video-bg {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit: cover;
    z-index: -2;
}

/* OVERLAY */
.overlay {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.7);
    z-index: -1;
}

/* CARDS */
.card {
    margin: 10px auto;
    padding: 15px;
    width: 300px;
    cursor: pointer;
    border-left: 4px solid #00aaff;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* PANEL */
.panel {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: radial-gradient(circle, #000, #050a12);
    display: none;
    z-index: 9999;
}

.container {
    display: flex;
    height: 100%;
}

/* LEFT (VOITURE) */
.left {
    width: 60%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* IMAGE VOITURE */
.car-img {
    width: 90%;
    max-width: 700px;
    filter: drop-shadow(0 0 40px #00aaff);
    animation: slide 0.6s forwards;
}

/* RIGHT (INFOS) */
.right {
    width: 40%;
    padding: 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* TITRES */
.name {
    font-size: 40px;
    color: white;
}

.nickname {
    color: #00aaff;
    margin-bottom: 20px;
}

/* CARD INFO */
.info-box {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* STATS */
.stat {
    margin: 10px 0;
}

.bar {
    height: 6px;
    background: #222;
    margin-top: 5px;
}

.fill {
    height: 100%;
    background: #00aaff;
    width: 0;
    transition: 1s;
}

/* IMAGE */
.car-img {
    width: 100%;
    animation: slide 0.6s forwards;
}

@keyframes slide {
    from { transform: translateX(-100px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

/* TEXTE */
.fade {
    opacity: 0;
    animation: fadeIn 0.5s forwards;
}

.fade:nth-child(2){animation-delay:0.2s;}
.fade:nth-child(3){animation-delay:0.4s;}
.fade:nth-child(4){animation-delay:0.6s;}

@keyframes fadeIn {
    to { opacity: 1; }
}

/* CLOSE */
.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 30px;
    cursor: pointer;
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop class="video-bg">
    <source src="classement.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<nav class="menu">
<a href="index.html">Accueil</a>
<a href="classement.html">Classement</a>
<a href="courses.html">Courses</a>
<a href="club.html">Club</a>
</nav>

<div class="content">

<h1>🏆 Classement</h1>

<div class="card" onclick="openPanel('p1')">#1 ?</div>
<div class="card" onclick="openPanel('p2')">#2 Saru</div>
<div class="card" onclick="openPanel('p3')">#3 ?</div>
<div class="card" onclick="openPanel('p4')">#4 ?</div>
<div class="card" onclick="openPanel('p5')">#5 ?</div>
<div class="card" onclick="openPanel('p6')">#6 ?</div>
<div class="card" onclick="openPanel('p7')">#7 ?</div>
<div class="card" onclick="openPanel('p8')">#8 ?</div>
<div class="card" onclick="openPanel('p9')">#9 ?</div>
<div class="card" onclick="openPanel('p10')">#10 ?</div>

</div>

<!-- PANEL -->
<div id="panel" class="panel">
<span class="close" onclick="closePanel()">✖</span>

<div class="container">
<div class="left">
<img id="car" class="car-img">
</div>
<div class="right" id="info"></div>
</div>

</div>

<script>

const pilots = {
p1:{name:"?",nickname:"?",car:"?",wins:0,p2:0,p3:0,carImg:"car1.png"},
p2:{name:"Ulysse",nickname:"Saru",car:"Nissan Skyline GT-R32 - Elegy Retro Custom",wins:0,p2:1,p3:0,carImg:"Photo LN Ulysse 2.png"},
p3:{name:"?",nickname:"?",car:"?",wins:0,p2:0,p3:0,carImg:"car1.png"},
p4:{name:"?",nickname:"?",car:"?",wins:0,p2:0,p3:0,carImg:"car1.png"},
p5:{name:"?",nickname:"?",car:"?",wins:0,p2:0,p3:0,carImg:"car1.png"},
p6:{name:"?",nickname:"?",car:"?",wins:0,p2:0,p3:0,carImg:"car1.png"},
p7:{name:"?",nickname:"?",car:"?",wins:0,p2:0,p3:0,carImg:"car1.png"},
p8:{name:"?",nickname:"?",car:"?",wins:0,p2:0,p3:0,carImg:"car1.png"},
p9:{name:"?",nickname:"?",car:"?",wins:0,p2:0,p3:0,carImg:"car1.png"},
p10:{name:"?",nickname:"?",car:"?",wins:0,p2:0,p3:0,carImg:"car1.png"}
};

function openPanel(id){
let p = pilots[id];

document.getElementById("car").src = p.carImg;

document.getElementById("info").innerHTML = `
<div class="name">${p.name}</div>
<div class="nickname">"${p.nickname}"</div>

<div class="info-box">
<b>Voiture :</b><br>${p.car}
</div>

<div class="info-box">
<b>Palmarès :</b><br>
🥇 ${p.wins} Victoires<br>
🥈 ${p.p2} Secondes places<br>
🥉 ${p.p3} Troisièmes places
</div>

<div class="info-box">
<b>Performance</b>

<div class="stat">Vitesse
<div class="bar"><div class="fill speed"></div></div>
</div>

<div class="stat">Contrôle
<div class="bar"><div class="fill control"></div></div>
</div>

<div class="stat">Style
<div class="bar"><div class="fill style"></div></div>
</div>

</div>
`;

document.getElementById("panel").style.display = "block";

/* ANIMATION DES BARRES */
setTimeout(()=>{
document.querySelector(".speed").style.width = (p.wins*10+20)+"%";
document.querySelector(".control").style.width = (p.p2*10+20)+"%";
document.querySelector(".style").style.width = (p.p3*10+20)+"%";
},300);
}

</script>

</body>
</html>
