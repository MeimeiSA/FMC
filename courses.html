<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Courses</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

<style>

/* GRID COMPACTE */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    padding: 20px;
    max-width: 900px;
    margin: auto;
}

/* CARDS */
.card {
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
    display: flex;
    align-items: flex-end;
    padding: 10px;
    font-size: 13px;
    color: white;
}

/* overlay sombre */
.card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
}

/* texte */
.card span {
    position: relative;
    z-index: 2;
}

/* hover */
.card:hover {
    transform: scale(1.08);
    box-shadow: 0 0 15px #ffcc00;
}

/* PANEL FIX */
.panel {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.98);
    display: none;
    z-index: 9999; /* 🔥 FIX BUG */
}

/* BLOQUE SCROLL */
body.panel-open {
    overflow: hidden;
}

.container {
    display: flex;
    height: 100%;
}

.left, .right {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.right {
    flex-direction: column;
    text-align: center;
}

/* IMAGE */
.track-img {
    width: 80%;
    animation: zoom 0.6s forwards;
}

@keyframes zoom {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* TEXTE */
.fade {
    opacity: 0;
    animation: fadeIn 0.5s forwards;
}

.fade:nth-child(2){animation-delay:0.2s;}
.fade:nth-child(3){animation-delay:0.4s;}
.fade:nth-child(4){animation-delay:0.6s;}

@keyframes fadeIn {
    to { opacity: 1; }
}

/* CLOSE */
.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 30px;
    cursor: pointer;
}

</style>
</head>

<body>

<nav class="menu">
<a href="index.html">Accueil</a>
<a href="classement.html">Classement</a>
<a href="courses.html">Courses</a>
<a href="club.html">Club</a>
</nav>

<div class="content">

<h1>🏎️ Circuits</h1>

<div class="grid">

<div class="card" style="background:url('Lotus Circuit.png') center/cover;" onclick="openCircuit('c1')">
<span>Lotus</span>
</div>

<div class="card" style="background:url('aonami route.png') center/cover;" onclick="openCircuit('c2')">
<span>Aonami Road</span>
</div>

<div class="card" style="background:url('interrogation.jpg') center/cover;" onclick="openCircuit('c3')">
<span>Highway</span>
</div>

<div class="card" style="background:url('interrogation.jpg') center/cover;" onclick="openCircuit('c4')">
<span>Vinewood</span>
</div>

<div class="card" style="background:url('interrogation.jpg') center/cover;" onclick="openCircuit('c5')">
<span>Airport</span>
</div>

<div class="card" style="background:url('interrogation.jpg') center/cover;" onclick="openCircuit('c6')">
<span>Desert</span>
</div>

</div>

</div>

<!-- PANEL -->
<div id="panel" class="panel">
<span class="close" onclick="closePanel()">✖</span>

<div class="container">
<div class="left">
<img id="track" class="track-img">
</div>
<div class="right" id="info"></div>
</div>

</div>

<script>

const circuits = {
c1:{name:"Lotus",date:"?",difficulty:"⭐⭐⭐⭐⭐",length:"? km",img:"Lotus Circuit.png"},
c2:{name:"Aonami Road",date:"?",difficulty:"⭐⭐⭐",length:"? km",img:"aonami route.png"},
c3:{name:"Highway Storm",date:"?",difficulty:"⭐⭐",length:"? km",img:"interrogation.jpg"},
c4:{name:"Vinewood Night",date:"?",difficulty:"⭐⭐⭐⭐",length:"? km",img:"interrogation.jpg"},
c5:{name:"Airport Speed",date:"?",difficulty:"⭐⭐⭐",length:"? km",img:"interrogation.jpg"},
c6:{name:"Desert Run",date:"?",difficulty:"⭐⭐",length:"? km",img:"interrogation.jpg"}
};

function openCircuit(id){
let c = circuits[id];

document.getElementById("track").src = c.img;

document.getElementById("info").innerHTML = `
<h1 class="fade">${c.name}</h1>
<p class="fade"><b>Date :</b> ${c.date}</p>
<p class="fade"><b>Longueur :</b> ${c.length}</p>
<p class="fade"><b>Difficulté :</b> ${c.difficulty}</p>
`;

document.getElementById("panel").style.display = "block";
document.body.classList.add("panel-open"); // 🔥 bloque scroll
}

function closePanel(){
document.getElementById("panel").style.display = "none";
document.body.classList.remove("panel-open");
}

</script>

</body>
</html>
