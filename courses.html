<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Courses</title>

<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

<style>

body {
    margin:0;
    font-family:'Russo One', sans-serif;
    background:#050a12;
    color:white;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
    gap:15px;
    padding:40px;
    max-width:1000px;
    margin:auto;
}

.card {
    aspect-ratio:1/1;
    border-radius:10px;
    overflow:hidden;
    position:relative;
    cursor:pointer;
    display:flex;
    align-items:flex-end;
    padding:10px;
}

.card::after {
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.5);
}

.card span {
    z-index:2;
}

.card:hover {
    transform:scale(1.05);
    box-shadow:0 0 15px #00aaff;
}

/* PANEL BACKGROUND */
.panel {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:none;
    z-index:9999;
    overflow-y:auto; /* 🔥 SCROLL */
}

/* CONTAINER CENTRÉ */
.panel-content {
    max-width:1100px;
    margin:80px auto;
    background:#0a0f18;
    border-radius:15px;
    padding:30px;
    display:flex;
    gap:30px;
}

/* LEFT */
.left {
    flex:1;
    display:flex;
    flex-direction:column;
    gap:20px;
}

/* IMAGE */
.track-img {
    width:100%;
    max-height:250px; /* 🔥 LIMITÉ */
    object-fit:contain;
    border-radius:10px;
}

/* VIDEO */
iframe {
    width:100%;
    height:250px;
    border-radius:10px;
}

/* RIGHT */
.right {
    width:300px;
    display:flex;
    flex-direction:column;
    gap:20px;
}

/* BOX */
.box {
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(0,170,255,0.2);
    border-radius:10px;
    padding:15px;
}

/* TITLE */
.title {
    font-size:28px;
}

/* CLOSE */
.close {
    position:fixed;
    top:20px;
    right:30px;
    font-size:30px;
    cursor:pointer;
}

</style>
</head>

<body>

<h1 style="text-align:center;margin-top:40px;">🏁 Circuits</h1>

<div class="grid">

<div class="card" style="background:url('Lotus Circuit.png') center/cover;" onclick="openCircuit('c1')">
<span>Lotus</span>
</div>

<div class="card" style="background:url('aonami route.png') center/cover;" onclick="openCircuit('c2')">
<span>Aonami Road</span>
</div>

</div>

<!-- PANEL -->
<div id="panel" class="panel">

<span class="close" onclick="closePanel()">✖</span>

<div class="panel-content">

<div class="left">

<img id="track" class="track-img">

<iframe id="video" src="" frameborder="0" allowfullscreen></iframe>

</div>

<div class="right">

<div class="box">
<div class="title" id="title"></div>
</div>

<div class="box" id="info"></div>

</div>

</div>

</div>

<script>

const circuits = {

c1:{
name:"Lotus",
date:"?",
difficulty:"⭐⭐⭐⭐⭐",
length:"? km",
img:"Lotus Circuit.png",
video:""
},

c2:{
name:"Aonami Road",
date:"?",
difficulty:"⭐⭐⭐",
length:"? km",
img:"aonami route.png",
video:"https://www.youtube.com/embed/RqD3kEDCCz8?autoplay=1&mute=1"
}

};

function openCircuit(id){

let c = circuits[id];

document.getElementById("track").src = c.img;
document.getElementById("video").src = c.video;

document.getElementById("title").innerText = c.name;

document.getElementById("info").innerHTML = `
<b>Date :</b> ${c.date}<br>
<b>Longueur :</b> ${c.length}<br>
<b>Difficulté :</b> ${c.difficulty}
`;

document.getElementById("panel").style.display = "block";
}

function closePanel(){
document.getElementById("panel").style.display = "none";
document.getElementById("video").src = "";
}

</script>

</body>
</html>
