<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Courses</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

<style>

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    padding: 20px;
    max-width: 900px;
    margin: auto;
}

/* CARDS */
.card {
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    padding: 10px;
    font-size: 13px;
    color: white;
}

.card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
}

.card span {
    position: relative;
    z-index: 2;
}

.card:hover {
    transform: scale(1.08);
    box-shadow: 0 0 15px #ffcc00;
}

/* PANEL */
.panel {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.98);
    display: none;
    z-index: 9999;
}

body.panel-open {
    overflow: hidden;
}

.container {
    display: flex;
    height: 100%;
}

/* LEFT */
.left {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* IMAGE */
.track-img {
    width: 80%;
    margin-bottom: 20px;
}

/* VIDEO */
video {
    width: 80%;
    border-radius: 10px;
}

/* RIGHT */
.right {
    width: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
}

/* CLOSE */
.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 30px;
    cursor: pointer;
}

</style>
</head>

<body>

<nav class="menu">
<a href="index.html">Accueil</a>
<a href="classement.html">Classement</a>
<a href="courses.html">Courses</a>
<a href="club.html">Club</a>
</nav>

<div class="content">
<h1>🏎️ Circuits</h1>

<div class="grid">

<div class="card" style="background:url('Lotus Circuit.png') center/cover;" onclick="openCircuit('c1')">
<span>Lotus</span>
</div>

<div class="card" style="background:url('aonami route.png') center/cover;" onclick="openCircuit('c2')">
<span>Aonami Road</span>
</div>

</div>
</div>

<!-- PANEL -->
<div id="panel" class="panel">
<span class="close" onclick="closePanel()">✖</span>

<div class="container">

<div class="left">
<div>
<img id="track" class="track-img">
<video id="video" controls></video>
</div>
</div>

<div class="right" id="info"></div>

</div>
</div>

<script>

const circuits = {

c1:{
name:"Lotus",
date:"?",
difficulty:"⭐⭐⭐⭐⭐",
length:"? km",
img:"Lotus Circuit.png",
video:"lotus.mp4"
},

c2:{
name:"Aonami Road",
date:"?",
difficulty:"⭐⭐⭐",
length:"? km",
img:"aonami route.png",
video:"aonami.mp4"
}

};

function openCircuit(id){
let c = circuits[id];

document.getElementById("track").src = c.img;

let vid = document.getElementById("video");
vid.src = c.video;

document.getElementById("info").innerHTML = `
<h1>${c.name}</h1>
<p><b>Date :</b> ${c.date}</p>
<p><b>Longueur :</b> ${c.length}</p>
<p><b>Difficulté :</b> ${c.difficulty}</p>
`;

document.getElementById("panel").style.display = "block";
document.body.classList.add("panel-open");
}

function closePanel(){
document.getElementById("panel").style.display = "none";
document.body.classList.remove("panel-open");

/* 🔥 STOP VIDEO */
document.getElementById("video").pause();
}

</script>

</body>
</html>
