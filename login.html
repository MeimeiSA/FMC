<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Accès Restreint</title>

<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Russo One', sans-serif;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login-box {
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 10px;
    text-align: center;
    border: 1px solid rgba(0,170,255,0.2);
}

input {
    padding: 10px;
    margin-top: 20px;
    border: none;
    outline: none;
    width: 200px;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    background: #00aaff;
    border: none;
    cursor: pointer;
}

.error {
    color: red;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="login-box">
<h2>🔒 Accès sécurisé</h2>
<p>Entrer le code d'accès</p>

<input type="password" id="pass" placeholder="Mot de passe">

<br>

<button onclick="check()">ENTRER</button>

<div class="error" id="error"></div>
</div>

<script>

function check(){
let pass = document.getElementById("pass").value;

if(pass === "RsUsM12"){ // 🔥 CHANGE ICI
    localStorage.setItem("auth", "ok"); // mémoire
    window.location.href = "index.html";
}else{
    document.getElementById("error").innerText = "Accès refusé";
}
}

</script>

</body>
</html>
